name: Build Tarot Polis APK

on:
  push:
    branches: ["main"]
    paths:
      - "tarot-polis-src/**"
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tarot-polis-src/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        working-directory: tarot-polis-src
        run: npm install

      - name: Build web assets
        working-directory: tarot-polis-src
        run: npm run build

      - name: Add Android platform
        working-directory: tarot-polis-src
        run: npx cap add android

      - name: Sync web assets to Android
        working-directory: tarot-polis-src
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: tarot-polis-src/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: tarot-polis-src/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarot-polis-debug-${{ github.run_number }}
          path: tarot-polis-src/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
