<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Sorte do Dia - Estilo Cards Against Humanity</title>

<style>
body{
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.container{
    max-width: 700px;
    width: 100%;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    color: #ffcc00;
    text-transform: uppercase;
    letter-spacing: 2px;
}

p.subtitle {
    color: #888;
    margin-bottom: 40px;
}

#fortune{
    font-size: 24px;
    margin: 40px 0;
    line-height: 1.6;
    background: #222;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
}

button{
    padding: 15px 35px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    transition: transform 0.1s ease, background 0.2s;
    text-transform: uppercase;
}

button:hover {
    background: #e6b800;
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

/* Responsividade para celular */
@media (max-width: 600px) {
    h1 { font-size: 1.8rem; }
    #fortune { font-size: 18px; padding: 20px; }
    button { width: 100%; }
}
</style>
</head>

    <h1>Sua Sorte do Dia</h1>
    <p class="subtitle">Sabedoria duvidosa para problemas reais.</p>

    <div id="fortune">

function random(array){
    return array[Math.floor(Math.random() * array.length)];
}

function generateFortune(){

    // Efeito simples de fade-in ao trocar o texto
    const fortuneDiv = document.getElementById("fortune");
    fortuneDiv.style.opacity = 0;
    
    setTimeout(() => {
        fortuneDiv.innerText = fortune;
        fortuneDiv.style.opacity = 1;
        fortuneDiv.style.transition = "opacity 0.3s ease";
    }, 150);
}
