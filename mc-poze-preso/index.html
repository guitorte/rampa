<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC Poze do Rodo já foi preso esse mês?</title>
  <meta name="description" content="Descubra agora se o MC Poze do Rodo já foi preso neste mês.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f10;
      color: #f5f5f5;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 500;
      max-width: 720px;
      line-height: 1.3;
      margin-bottom: 2rem;
    }
    .status {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #22c55e;
      text-transform: uppercase;
      line-height: 1;
    }
    footer {
      position: fixed;
      bottom: 1rem;
      left: 0;
      right: 0;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <main>
    <h1>MC Poze do Rodo já foi preso esse mês?</h1>
    <p class="status">Sim</p>
  </main>
  <footer>
    <span id="updated"></span>
  </footer>
  <script>
    const months = [
      "janeiro", "fevereiro", "março", "abril", "maio", "junho",
      "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"
    ];
    const now = new Date();
    document.getElementById("updated").textContent =
      "Atualizado em " + months[now.getMonth()] + " de " + now.getFullYear() + ".";
  </script>
</body>
</html>
